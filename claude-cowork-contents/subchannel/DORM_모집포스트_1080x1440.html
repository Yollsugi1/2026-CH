<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>DORM 입주자 모집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    overflow: hidden;
    position: relative;
  }

  .container {
    width: 100%;
    height: 100%;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  /* 배경 그래디언트 악센트 */
  .bg-accent {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
    z-index: 0;
  }
  .bg-accent-2 {
    position: absolute;
    bottom: -100px;
    left: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
    z-index: 0;
  }

  /* 상단 */
  .top-section {
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  .tag-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tag {
    display: inline-block;
    padding: 10px 20px;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.7);
  }

  .main-title {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.05;
    color: #ffffff;
  }

  .main-title .accent {
    color: #ff6b35;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
    letter-spacing: -0.02em;
    margin-top: 8px;
  }

  /* 중단 — 핵심 내용 */
  .middle-section {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: rgba(255,255,255,0.15);
  }

  .desc-block {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .desc-label {
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.35);
  }

  .desc-items {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .desc-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255,255,255,0.75);
    letter-spacing: -0.01em;
  }

  .desc-item .num {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #ff6b35;
    min-width: 28px;
    margin-top: 3px;
  }

  /* 조건 태그 */
  .condition-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .condition-tag {
    padding: 12px 24px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.01em;
  }

  /* 하단 */
  .bottom-section {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 36px;
    background: #ff6b35;
    border-radius: 100px;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .cta-sub {
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    letter-spacing: -0.01em;
  }

  .handle {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>

<div class="bg-accent"></div>
<div class="bg-accent-2"></div>

<div class="container">

  <!-- 상단 -->
  <div class="top-section">
    <div class="tag-row">
      <span class="tag">크리에이터후드</span>
      <span class="tag">2026 신규 에디터</span>
    </div>
    <div>
      <div class="main-title">
        <span class="accent">DORM</span><br>
        입주자 모집
      </div>
      <div class="subtitle">
        스포츠를 좋아하는 사람들이 모인<br>
        우리만의 기숙사를 만듭니다.
      </div>
    </div>
  </div>

  <!-- 중단 -->
  <div class="middle-section">
    <div class="divider"></div>
    <div class="desc-block">
      <div class="desc-label">What you'll do</div>
      <div class="desc-items">
        <div class="desc-item">
          <span class="num">01</span>
          <span>스포츠·피트니스·라이프스타일 소재 발굴</span>
        </div>
        <div class="desc-item">
          <span class="num">02</span>
          <span>사람을 직접 만나 이야기 듣기</span>
        </div>
        <div class="desc-item">
          <span class="num">03</span>
          <span>릴스 · 캐러셀 · 스토리 콘텐츠 제작</span>
        </div>
      </div>
    </div>
    <div class="condition-row">
      <span class="condition-tag">스마트폰이면 충분</span>
      <span class="condition-tag">전공 무관</span>
      <span class="condition-tag">휴학생 가능</span>
    </div>
  </div>

  <!-- 하단 -->
  <div class="bottom-section">
    <div class="cta-row">
      <div class="cta-button">프로필 링크에서 지원 →</div>
      <span class="cta-sub">문의 DM 환영</span>
    </div>
    <div class="handle">@creatorhood.mag</div>
  </div>

</div>

</body>
</html>
